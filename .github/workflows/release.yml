name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download PowerNukkitX
        run: |
          mkdir -p ../PowerNukkitX/build
          gh release download --repo PowerNukkitX/PowerNukkitX --pattern "powernukkitx.jar" --output ../PowerNukkitX/build/powernukkitx.jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: chmod +x gradlew && ./gradlew shadowJar

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/InvMenuPNX-*.jar
